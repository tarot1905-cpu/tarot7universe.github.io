<!DOCTYPE html>                                                                                                                                                                                                                                                                                                  
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Tarot7Universe</title>
      <style>
          * { margin: 0; padding: 0; box-sizing: border-box; }
          body {
              font-family: 'Segoe UI', system-ui, sans-serif;
              background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1628 100%);
              color: #e0d8c8;
              min-height: 100vh;
              display: flex;
              align-items: center;
              justify-content: center;
          }
          .container { text-align: center; padding: 40px; max-width: 600px; }
          .logo { font-size: 64px; margin-bottom: 16px; }
          h1 {
              font-size: 2.4rem;
              background: linear-gradient(90deg, #c9a84c, #f0d78c, #c9a84c);
              -webkit-background-clip: text;
              -webkit-text-fill-color: transparent;
              margin-bottom: 8px;
          }
          .tagline { font-size: 1rem; color: #8a7f6a; margin-bottom: 32px; font-style: italic; }
          .desc { font-size: 1.1rem; line-height: 1.7; color: #b8ad98; margin-bottom: 40px; }
          .links { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; }
          .links a {
              color: #c9a84c; text-decoration: none; font-size: 0.9rem;
              padding: 8px 20px; border: 1px solid #c9a84c33; border-radius: 20px; transition: all 0.3s;
          }
          .links a:hover { background: #c9a84c1a; border-color: #c9a84c88; }
      </style>
  </head>
  <body>
      <div class="container">
          <div class="logo">&#x2728;</div>
          <h1>Tarot7Universe</h1>
          <p class="tagline">Daily tarot readings for every zodiac sign</p>
          <p class="desc">Tarot7Universe delivers daily tarot reading videos for all zodiac signs, auto-published as short-form vertical content. Mystical insights powered by ancient wisdom, crafted for the modern soul.</p>
          <div class="links">
              <a href="terms.html">Terms of Service</a>
              <a href="privacy.html">Privacy Policy</a>
          </div>
      </div>
  </body>
  </html>
